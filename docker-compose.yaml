services:
  # --- Font for PostgreSQL: https://hub.docker.com/_/postgres ---
  database:
    image: postgres:15-alpine
    container_name: chess_database
    restart: always # We can set 'unless-stopped', it will close the  container when we turn off the pc
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # We don't have to update the data base directly in the code, so we don't set any file to "Bind Mounts"
    networks:
      - transcendence
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess_backend
    restart: always
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on: # We don't need this in inception, because we run the bash scripts directly
      - database # Depends on the first container, telling to create the database first
    networks:
      - transcendence
    # This volumes allows the "bind mount" to update the code when we are codding, no need to restart the container
    volumes:
      - ./backend:/usr/src/app # This way we say that the code in ./backend, will update the docker
      - /usr/src/app/node_modules
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend
    networks:
      - transcendence
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    
networks:
  transcendence:
    driver: bridge

# Defines the the volume don't lost the chess data when the dockers goes down
volumes:
  postgres_data: